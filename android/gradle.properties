org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# ── TỐI ƯU GRADLE DAEMON ──────────────────────────────────────────────────────
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# ── KOTLIN DAEMON ─────────────────────────────────────────────────────────────
# Cấp đủ RAM để tránh OOM kill (nguyên nhân gây cache corrupt)
kotlin.daemon.jvm.options=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:+UseG1GC
# Giữ incremental ON — build nhanh (chỉ compile file thay đổi)
kotlin.incremental=true
# Tắt classpath snapshot — tính năng gây lỗi "already registered" trên Windows
kotlin.incremental.useClasspathSnapshot=false
